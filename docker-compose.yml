# Docker Compose para PostgreSQL (opcional para produção)
# Para desenvolvimento, o projeto usa H2 Database (inicialização automática)
# Para usar PostgreSQL, configure config.properties com as credenciais abaixo

version: "3.8"
services:
  db:
    image: postgres:15
    container_name: csonline-postgres
    restart: always
    environment:
      POSTGRES_DB: caracore_csodatabase
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
volumes:
  pg_data:
