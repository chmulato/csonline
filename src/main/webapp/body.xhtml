<!DOCTYPE html>
<html xmlns="https://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">
<f:view contentType="text/html" locale="pt_BR">
    <f:loadBundle basename="Rotulos" var="rotulo" />

    <h:head>
        <meta http-equiv="X-UA-Compatible" content="IE=8" />
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link type="images/x-icon" rel="SHORTCUT ICON"
              href="#{facesContext.externalContext.requestContextPath}/images/favicon.ico" />
        <link type="text/css" rel="stylesheet" href="resources/styles.css" />
        <title>#{rotulo.aplicacao}</title>
    </h:head>

    <body>
        <div id="body">
            <ui:insert name="body" />
        </div>
    </body>
</f:view>
</html>
